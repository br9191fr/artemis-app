#mkdir version: '3.8'
services:
  artemis:
    image: apache/activemq-artemis:2.31.2
    user: root
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
    volumes:
      - artemis-data:/var/lib/artemis-instance/data
volumes:
  artemis-data:
